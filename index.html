<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>كلمة عزوز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f7f6;color:#1a2e2a;font-family:'Tajawal',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
html{touch-action:manipulation;}

/* ── Colors ──
   Teal  : #1e8a78  (correct)
   Orange: #e07530  (present)
   Gray  : #c8d4d0  (absent)
   BG    : #f5f7f6
*/

/* ── Auth ── */
#aw-auth{position:fixed;inset:0;background:#f5f7f6;display:flex;align-items:center;justify-content:center;z-index:999;direction:rtl;}
.aw-ac{background:#fff;border:1.5px solid #d4e4e0;border-radius:20px;padding:2rem;width:300px;text-align:center;box-shadow:0 4px 24px rgba(30,138,120,.08);}
.aw-ai{width:100%;height:46px;border:1.5px solid #b8d4ce;border-radius:10px;background:#f5f7f6;color:#1a2e2a;font-size:18px;font-family:inherit;text-align:center;letter-spacing:4px;padding:0 36px 0 8px;outline:none;transition:border-color .15s;}
.aw-ai:focus{border-color:#1e8a78;}
.aw-ai.shake{animation:aw-shake .3s ease;}
.aw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8aada8;font-size:16px;padding:0;}
.aw-ab{width:100%;height:44px;background:#1e8a78;color:#fff;border:none;border-radius:10px;font-size:16px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.aw-ab:hover{opacity:.88;}
.aw-ae{font-size:12px;color:#e07530;min-height:18px;margin-top:6px;}
@keyframes aw-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* ── Main ── */
#aw-main{max-width:460px;margin:0 auto;padding:.75rem 1rem 2rem;position:relative;overflow-x:hidden;}
#aw-main.hidden{display:none;}
.aw-sb{background:none;border:none;cursor:pointer;font-size:20px;opacity:.5;padding:0;}
.aw-sb:hover{opacity:.8;}

/* ── Balance bar ── */
.aw-bal{display:flex;margin-bottom:.85rem;direction:rtl;background:#fff;border-radius:14px;border:1px solid #d4e4e0;overflow:hidden;}
.aw-bi{flex:1;text-align:center;padding:10px 0;}
.aw-bi+.aw-bi{border-right:1px solid #e8f0ee;}
.aw-bi-icon{font-size:14px;margin-bottom:2px;}
.aw-bn{font-size:28px;font-weight:800;line-height:1;display:block;margin-bottom:3px;}
.aw-bl-label{font-size:10px;color:#8aada8;letter-spacing:.3px;font-weight:500;}
.aw-div{display:none;}

/* ── Tiles ── */
.aw-tile{width:54px;height:54px;border:2px solid #c8d4d0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;background:#fff;color:#1a2e2a;transition:border-color .08s;will-change:transform;}
.aw-tile.filled{border-color:#1e8a78;background:#f0faf8;}
.aw-tile.correct{background:#1e8a78;border-color:#1e8a78;color:#fff;}
.aw-tile.present{background:#e07530;border-color:#e07530;color:#fff;}
.aw-tile.absent{background:#c8d4d0;border-color:#c8d4d0;color:#8aada8;}

/* ── Keyboard ── */
.aw-key{
  height:44px;
  flex:1;min-width:0;
  border:1.5px solid #d4e4e0;border-radius:8px;
  background:#fff;color:#1a2e2a;cursor:pointer;
  font-family:inherit;font-size:clamp(11px,3.5vw,15px);
  font-weight:600;padding:0;
  touch-action:manipulation;
  transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.aw-key:hover{background:#eaf4f2;}
.aw-key.correct{background:#1e8a78;border-color:#1e8a78;color:#fff;}
.aw-key.present{background:#e07530;border-color:#e07530;color:#fff;}
.aw-key.absent{background:#e0e8e6;border-color:#c8d4d0;color:#aac4be;}
.aw-key-del{flex:1.5;font-size:clamp(13px,4vw,16px);}

#aw-msg{font-size:13px;color:#8aada8;min-height:20px;text-align:center;direction:rtl;margin:.2rem 0 .5rem;font-weight:500;}
</style>
</head>

// ════════════════════════════════════════
//  لا تعدّل ما تحت هذا السطر
// ════════════════════════════════════════
const AW_AK='awg_auth_v1', AW_SK='awg_v1';

const AW_KB=[
  ['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د'],
  ['ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط'],
  ['ئ','ء','ؤ','ر','ى','ة','و','ز','ظ','ذ','DEL'],
];
const AW_ALL=['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د','ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط','ئ','ء','ؤ','ر','ى','ة','و','ز','ظ','ذ'];

let awTgt,awTI,awCur=[],awAtt=[],awOver=false,awLocked=false,awSnd=true;
const awKE={};
let _awC;

// ── Audio ──
function awCtx(){if(!_awC)_awC=new(window.AudioContext||window.webkitAudioContext)();if(_awC.state==='suspended')_awC.resume();return _awC;}
function awPC(){if(!awSnd)return;try{const c=awCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=900;g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);o.start();o.stop(c.currentTime+0.06);}catch(e){}}
function awPB(){if(!awSnd)return;try{const c=awCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=350;g.gain.setValueAtTime(0.07,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.start();o.stop(c.currentTime+0.15);}catch(e){}}
function awPL(){if(!awSnd)return;try{const c=awCtx();[280,230,180].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=f;const t=c.currentTime+i*.13;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+.11);o.start(t);o.stop(t+.11);});}catch(e){}}
function awPW(){if(!awSnd)return;try{const c=awCtx();[523,659,784,1047,1319].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;const t=c.currentTime+i*.1;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+.22);o.start(t);o.stop(t+.22);});setTimeout(()=>{try{[784,1047,1319,1568].forEach((f,i)=>{const o=_awC.createOscillator(),g=_awC.createGain();o.connect(g);g.connect(_awC.destination);o.type='sine';o.frequency.value=f;const t=_awC.currentTime+i*.08;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+.18);o.start(t);o.stop(t+.18);});}catch(e){}},600);}catch(e){}}
function awTS(){awSnd=!awSnd;document.getElementById('aw-sb').textContent=awSnd?'🔊':'🔇';}

// ── Auth ──
function awCA(){
  const v=document.getElementById('aw-ai').value;
  if(v===AW_PASS){
    try{localStorage.setItem(AW_AK,'1');}catch(e){}
    document.getElementById('aw-auth').style.display='none';
    document.getElementById('aw-main').classList.remove('hidden');
    awNG();
  } else {
    const i=document.getElementById('aw-ai');
    document.getElementById('aw-ae').textContent='كلمة المرور غلط، حاول مرة ثانية';
    i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');
    i.value='';i.focus();
  }
}
function awTE(){const i=document.getElementById('aw-ai');i.type=i.type==='password'?'text':'password';}

// ── State ──
function awGS(){try{return JSON.parse(localStorage.getItem(AW_SK))||awDS();}catch{return awDS();}}
function awDS(){return{usedWords:[],dailyDate:'',dailyCount:0,wins:0,totalPlayed:0};}
function awSS(s){try{localStorage.setItem(AW_SK,JSON.stringify(s));}catch{}}
function awTd(){return new Date().toISOString().split('T')[0];}
function awCD(s){if(s.dailyDate!==awTd()){s.dailyDate=awTd();s.dailyCount=0;}return s;}
function awRem(s){return AW_W.map((_,i)=>i).filter(i=>!s.usedWords.includes(i)).length;}
function awRT(s){return Math.max(0,AW_DL-s.dailyCount);}
function awPick(s){const a=AW_W.map((_,i)=>i).filter(i=>!s.usedWords.includes(i));if(!a.length)return null;return a[Math.floor(Math.random()*a.length)];}

// ── Balance ──
function awRB(){
  const s=awCD(awGS()),rt=awRT(s);
  const bt=document.getElementById('aw-bt');
  bt.innerHTML=rt+'<span style="font-size:14px;font-weight:400;color:#b0c8c4;">/'+AW_DL+'</span>';
  bt.style.color=rt===0?'#e07530':rt<=3?'#cc8822':'#1e8a78';
  const bw=document.getElementById('aw-bw');
  bw.innerHTML=s.wins+'<span style="font-size:14px;font-weight:400;color:#b0c8c4;">/'+s.totalPlayed+'</span>';
  document.getElementById('aw-br').textContent=awRem(s);
}

// ── Game ──
function awNG(){
  let s=awGS();s=awCD(s);
  if(awRT(s)<=0){awSBL(s);return;}
  const idx=awPick(s);
  if(idx===null){awSM('انتهيت من كل الكلمات! انتظر كلمات جديدة');return;}
  awTI=idx;awTgt=AW_W[idx];
  awCur=[];awAtt=[];awOver=false;awLocked=false;
  awSM('');
  document.getElementById('aw-ga').style.display='flex';
  document.getElementById('aw-ga').style.flexDirection='column';
  document.getElementById('aw-bl').style.display='none';
  awBKB();awRG();awRB();
}

function awSBL(s){
  document.getElementById('aw-ga').style.display='none';
  document.getElementById('aw-bl').style.display='block';
  document.getElementById('aw-blm').textContent='اليوم لعبت '+s.dailyCount+' لعبات وربحت '+s.wins+' — تعال بكرة وعندك '+AW_DL+' رصيد جديد 🎮';
  awRB();
}

function awEval(g){
  const res=Array(5).fill('absent');const tc=[...awTgt],gc=[...g];
  for(let i=0;i<5;i++){if(gc[i]===tc[i]){res[i]='correct';tc[i]=null;gc[i]=null;}}
  for(let i=0;i<5;i++){if(gc[i]!==null){const j=tc.indexOf(gc[i]);if(j!==-1){res[i]='present';tc[j]=null;}}}
  return res;
}

// ── Flip animation ──
function awAnimate(rowIdx,letters,results,done){
  const HALF=140,STAGGER=150;
  for(let col=0;col<5;col++){
    const tile=document.getElementById('awt-'+rowIdx+'-'+col);
    if(!tile)continue;
    const delay=col*STAGGER;
    setTimeout(()=>{
      tile.style.transition='transform '+HALF+'ms ease-in';
      tile.style.transform='perspective(300px) rotateX(-90deg)';
      setTimeout(()=>{
        tile.classList.add(results[col]);
        tile.style.transition='transform '+HALF+'ms ease-out';
        tile.style.transform='perspective(300px) rotateX(0deg)';
        setTimeout(()=>awUSK(letters[col],results[col]),HALF);
      },HALF);
    },delay);
  }
  setTimeout(done,4*STAGGER+2*HALF+80);
}

function awSubmit(){
  if(awOver||awCur.length<5)return;
  const res=awEval(awCur);
  const letters=[...awCur];
  const rowIdx=awAtt.length;
  awAtt.push({l:letters,r:res});
  awCur=[];
  awRG(rowIdx);
  awAnimate(rowIdx,letters,res,()=>{
    const won=res.every(r=>r==='correct');
    if(won){
      awOver=true;awPW();
      let s=awGS();s=awCD(s);s.usedWords.push(awTI);s.dailyCount++;s.totalPlayed++;s.wins++;
      awSS(s);awSM('🎉 أحسنت! خمّنتها صح');awRB();
    } else if(awAtt.length>=5){
      awOver=true;awPL();
      let s=awGS();s=awCD(s);s.usedWords.push(awTI);s.dailyCount++;s.totalPlayed++;
      awSS(s);awSM('الكلمة كانت: '+awTgt.join(''));awRB();
    } else {
      awPB();
    }
    awLocked=false;
  });
}

function awAdd(l){
  if(awOver||awLocked||awCur.length>=5)return;
  awPC();awCur.push(l);awRG();
  if(awCur.length===5){awLocked=true;setTimeout(awSubmit,280);}
}
function awDel(){if(!awOver&&!awLocked&&awCur.length>0){awCur.pop();awRG();}}
function awSM(t){document.getElementById('aw-msg').textContent=t||'\u00a0';}

// ── Grid ──
function awRG(animRow=-1){
  const g=document.getElementById('aw-grid');g.innerHTML='';
  for(let row=0;row<5;row++){
    const rowEl=document.createElement('div');
    rowEl.style='display:flex;gap:5px;';
    for(let col=0;col<5;col++){
      const tile=document.createElement('div');
      tile.className='aw-tile';tile.id='awt-'+row+'-'+col;
      if(row<awAtt.length){
        const a=awAtt[row];tile.textContent=a.l[col];
        if(row!==animRow)tile.classList.add(a.r[col]);
      } else if(row===awAtt.length&&!awOver&&col<awCur.length){
        tile.textContent=awCur[col];tile.classList.add('filled');
      }
      rowEl.appendChild(tile);
    }
    g.appendChild(rowEl);
  }
}

// ── Keyboard ──
function awBKB(){
  const kb=document.getElementById('aw-kb');kb.innerHTML='';
  Object.keys(awKE).forEach(k=>delete awKE[k]);
  for(const row of AW_KB){
    const rowEl=document.createElement('div');rowEl.style='display:flex;gap:2px;width:100%;';
    for(const key of row){
      const btn=document.createElement('button');btn.className='aw-key';
      if(key==='DEL'){btn.textContent='⌫';btn.classList.add('aw-key-del');btn.onclick=awDel;}
      else{btn.textContent=key;awKE[key]=btn;btn.onclick=()=>awAdd(key);}
      rowEl.appendChild(btn);
    }
    kb.appendChild(rowEl);
  }
}

function awUSK(l,r){
  const btn=awKE[l];if(!btn)return;
  if(r==='correct')btn.className='aw-key correct';
  else if(r==='present'&&!btn.classList.contains('correct'))btn.className='aw-key present';
  else if(r==='absent'&&!btn.classList.contains('correct')&&!btn.classList.contains('present'))btn.className='aw-key absent';
}

// ── Physical keyboard ──
document.addEventListener('keydown',e=>{
  if(document.getElementById('aw-main').classList.contains('hidden'))return;
  if(e.key==='Backspace')awDel();
  else if(AW_ALL.includes(e.key))awAdd(e.key);
});

// ── Init ──
(function(){
  let ok=false;try{ok=localStorage.getItem(AW_AK)==='1';}catch(e){}
  if(ok){
    document.getElementById('aw-auth').style.display='none';
    document.getElementById('aw-main').classList.remove('hidden');
    awNG();
  } else {
    setTimeout(()=>document.getElementById('aw-ai').focus(),100);
  }
})();
</script>
