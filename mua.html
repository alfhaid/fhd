<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مهام المشروع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #15181e;
    --bg-soft: #1b1f27;
    --card: #1e222b;
    --card-hover: #242935;
    --line: #2c313d;
    --ink: #e9e6df;
    --ink-soft: #8b8f9c;
    --ink-dim: #5d616d;
    --gold: #c9a05c;

    --cat-work: #5b9bd5;
    --cat-home: #6fae7c;
    --cat-personal: #b08ad4;
    --cat-other: #9b9690;

    --pri-high: #e0665b;
    --pri-high-bg: rgba(224, 102, 91, 0.14);
    --pri-mid: #e0a050;
    --pri-mid-bg: rgba(224, 160, 80, 0.14);
    --pri-low: #8b8f9c;
    --pri-low-bg: rgba(139, 143, 156, 0.14);

    --owner-moaz: #5b9bd5;
    --owner-moaz-bg: rgba(91, 155, 213, 0.14);
    --owner-both: #d4a23a;
    --owner-both-bg: rgba(212, 162, 58, 0.14);
  }

  * { box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(201,160,92,0.05), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(91,155,213,0.04), transparent 40%);
    color: var(--ink);
    font-family: 'Noto Kufi Arabic', 'Tahoma', sans-serif;
    min-height: 100vh;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 20px 140px;
  }

  header{
    display:flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  header h1{
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 2.1rem;
    margin: 0;
    margin-top: 10px;
    color: var(--ink);
    letter-spacing: 0.5px;
    position: relative;
    display: inline-block;
    width: fit-content;
    line-height: 1;
  }
  header::after{
    content: '';
    position: absolute;
    bottom: -1px;
    right: 0;
    width: var(--title-line-width, 80px);
    height: 1px;
    background: var(--gold);
  }
  header .count{
    font-size: 0.78rem;
    color: var(--gold);
    font-weight: 700;
    padding: 5px 12px;
    background: rgba(201,160,92,0.12);
    border-radius: 14px;
    margin-top: 20px;
  }

  .add-box{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 26px;
    overflow: hidden;
  }
  .add-trigger{
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: transparent;
    border: none;
    padding: 16px 18px;
    cursor: pointer;
    transition: background .15s ease;
    box-sizing: border-box;
  }
  .add-trigger:hover{ background: var(--card-hover); }
  .add-trigger-label{
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 0.98rem;
    font-weight: 600;
    color: var(--gold);
  }
  .plus-circle{
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s ease;
    padding: 7px;
  }
  .plus-circle svg{ width: 100%; height: 100%; }
  .add-trigger.open .plus-circle{
    background: var(--gold);
    color: #1a1408;
    transform: rotate(45deg);
  }

  .options-panel{
    max-height: 0;
    overflow: hidden;
    transition: max-height .25s ease, opacity .2s ease;
    opacity: 0;
  }
  .options-panel.open{
    max-height: 420px;
    opacity: 1;
  }
  .options-panel-inner{
    padding: 0 18px 16px;
  }
  .options-panel .add-btn{ margin-top: 12px; }

  .input-line{
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding: 8px 2px 10px;
    margin-bottom: 12px;
  }
  .add-box input[type=text]{
    width: 100%;
    border: none;
    padding: 0;
    font-size: 0.98rem;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-weight: 500;
    background: transparent;
    color: var(--ink);
    direction: rtl;
    text-align: right;
  }
  .add-box input[type=text]::placeholder{ color: var(--ink-dim); }
  .add-box input[type=text]:focus{ outline: none; }
  .input-line:has(input:focus){ border-bottom-color: var(--gold); }

  .option-row{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
  }
  .option-row-label{
    font-size: 0.72rem;
    color: var(--ink-dim);
    flex-shrink: 0;
    width: 52px;
  }
  .chip-group{
    display: flex;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
  }
  .chip{
    border: 1px solid var(--line);
    background: var(--bg-soft);
    color: var(--ink-soft);
    font-size: 0.8rem;
    font-family: inherit;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: all .15s ease;
  }
  .chip:hover{ border-color: var(--ink-dim); }

  .chip.active[data-pri="عالية"]{ background: var(--pri-high-bg); border-color: var(--pri-high); color: var(--pri-high); }
  .chip.active[data-pri="متوسطة"]{ background: var(--pri-mid-bg); border-color: var(--pri-mid); color: var(--pri-mid); }
  .chip.active[data-pri="عادية"]{ background: var(--pri-low-bg); border-color: var(--pri-low); color: var(--pri-low); }

  .add-btn{
    width: 100%;
    background: var(--gold);
    color: #1a1408;
    border: none;
    border-radius: 9px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: filter .15s ease;
    margin-top: 4px;
  }
  .add-btn:hover{ filter: brightness(1.1); }

  .tabs{
    display: flex;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 5px;
    margin-bottom: 16px;
  }
  .tab-btn{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: transparent;
    border: none;
    border-radius: 9px;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    padding: 11px 8px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .tab-btn:hover{ background: var(--card-hover); color: var(--ink); }
  .tab-btn svg{
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .tab-btn .tab-count{
    font-size: 0.72rem;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    padding: 0 4px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
  }
  .tab-btn.active[data-tab="مهام"]{ background: rgba(201,160,92,0.14); color: var(--gold); }
  .tab-btn.active[data-tab="معاذ"]{ background: var(--owner-moaz-bg); color: var(--owner-moaz); }
  .tab-btn.active[data-tab="معاذ والقصاص"]{ background: var(--owner-both-bg); color: var(--owner-both); }

  .stats-card{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 13px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .stats-card.hidden{ display: none; }
  .stat-item{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 8px;
    border-right: 1px solid var(--line);
  }
  .stat-item:last-child{ border-right: none; }
  .stat-num{
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    font-family: 'Noto Kufi Arabic', sans-serif;
  }
  .stat-label{
    font-size: 0.68rem;
    color: var(--ink-dim);
    font-weight: 600;
  }

  #taskList{
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 10px;
  }

  .past-add-bar{
    margin-top: 4px;
    display: flex;
    justify-content: flex-end;
  }
  .past-add-trigger{
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 50%;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s ease;
    flex-shrink: 0;
  }
  .past-add-trigger:hover{ background: var(--card-hover); border-color: var(--gold); color: var(--gold); }
  .past-add-trigger svg{
    width: 18px;
    height: 18px;
  }

  .past-add-form{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 8px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .past-add-form input[type=text]{
    width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 10px 12px;
    font-size: 0.92rem;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-weight: 500;
    color: var(--ink);
    direction: rtl;
  }
  .past-add-form input[type=text]::placeholder{ color: var(--ink-dim); }
  .past-add-form input[type=text]:focus{ outline: none; border-color: var(--gold); }
  .past-date-row{
    display: flex;
    gap: 8px;
  }
  .past-date-row select{
    flex: 1;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 10px 8px;
    font-size: 0.85rem;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-weight: 500;
    color: var(--ink);
    direction: rtl;
    cursor: pointer;
  }
  .past-date-row select:focus{ outline: none; border-color: var(--gold); }
  .past-add-form-row{
    display: flex;
    gap: 8px;
  }
  .past-add-form-row .add-btn{ flex: 1; }
  .past-add-form .owner-cancel{
    margin-right: 0;
    flex-shrink: 0;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 0 16px;
  }

  .done-date{
    font-size: 0.74rem;
    color: var(--ink-dim);
    font-weight: 600;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .task{
    background: var(--card);
    border: 1px solid var(--line);
    border-right: 3px solid var(--line);
    border-radius: 11px;
    padding: 13px 16px;
    margin-bottom: 9px;
    transition: opacity .2s ease, background .15s ease;
  }
  .task-row{
    display:flex;
    align-items: center;
    gap: 13px;
  }
  .task:hover{ background: var(--card-hover); }


  .task[data-pri="عالية"]{ border-right-color: var(--pri-high); }
  .task[data-pri="متوسطة"]{ border-right-color: var(--pri-mid); }
  .task[data-pri="عادية"]{ border-right-color: var(--ink-dim); }

  .checkbox{
    width: 23px;
    height: 23px;
    border: 2px solid var(--line);
    border-radius: 7px;
    cursor: pointer;
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: transparent;
    transition: all .15s ease;
    color: transparent;
  }
  .checkbox:hover{ border-color: var(--gold); }
  .checkbox.checked{
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1408;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .task-body{ flex: 1; min-width: 0; }
  .task-text{
    font-size: 0.98rem;
    font-weight: 600;
    word-break: break-word;
    color: var(--ink);
    cursor: text;
    border-radius: 4px;
    padding: 1px 3px;
    margin-right: -3px;
    outline: none;
    transition: background .15s ease;
  }
  .task-text:hover{ background: rgba(201,160,92,0.08); }
  .task-text:focus{
    background: rgba(201,160,92,0.12);
    box-shadow: 0 0 0 1.5px var(--gold);
  }
  .task.done .task-text{ cursor: default; }

  .task[data-pri="عالية"] .task-text{ color: var(--pri-high); }
  .task[data-pri="متوسطة"] .task-text{ color: var(--pri-mid); }
  .task[data-pri="عادية"] .task-text{ color: var(--ink-soft); }

  .today-dot{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(201,160,92,0.18);
  }

  .del-btn{
    border: none;
    background: transparent;
    color: var(--ink-dim);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 5px 9px;
    flex-shrink: 0;
    border-radius: 7px;
    transition: all .15s ease;
  }
  .del-btn:hover{ background: var(--pri-high-bg); color: var(--pri-high); }

  /* Owner picker (inline) */
  .owner-picker{
    max-height: 0;
    overflow: hidden;
    transition: max-height .2s ease, opacity .15s ease, margin-top .2s ease;
    opacity: 0;
  }
  .owner-picker.open{
    max-height: 120px;
    opacity: 1;
    margin-top: 11px;
  }
  .owner-picker-inner{
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 11px;
    border-top: 1px dashed var(--line);
  }
  .owner-picker-label{
    font-size: 0.78rem;
    color: var(--ink-dim);
    flex-shrink: 0;
  }
  .owner-btn{
    border: 1px solid var(--line);
    background: var(--bg-soft);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .owner-btn.moaz{ color: var(--owner-moaz); }
  .owner-btn.moaz:hover{ background: var(--owner-moaz-bg); border-color: var(--owner-moaz); }
  .owner-btn.both{ color: var(--owner-both); }
  .owner-btn.both:hover{ background: var(--owner-both-bg); border-color: var(--owner-both); }
  .owner-cancel{
    border: none;
    background: transparent;
    color: var(--ink-dim);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 7px 8px;
    margin-right: auto;
    border-radius: 7px;
    transition: all .15s ease;
  }
  .owner-cancel:hover{ background: var(--line); color: var(--ink-soft); }

  .empty{
    text-align:center;
    color: var(--ink-dim);
    padding: 60px 20px;
    font-size: 0.95rem;
    font-weight: 500;
  }

  .summary-bar{
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 720px;
    background: var(--card);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    box-shadow: 0 -8px 24px -12px rgba(0,0,0,0.4);
    z-index: 500;
  }
  .summary-item{
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .summary-dot{
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .summary-dot.pri-عالية{ background: var(--pri-high); }
  .summary-dot.pri-متوسطة{ background: var(--pri-mid); }
  .summary-dot.pri-عادية{ background: var(--ink-dim); }
  .summary-item.pri-عالية{ color: var(--pri-high); }
  .summary-item.pri-متوسطة{ color: var(--pri-mid); }
  .summary-item.pri-عادية{ color: var(--ink-soft); }
  .summary-empty{
    color: var(--ink-dim);
    font-size: 0.85rem;
    font-weight: 500;
  }

  @media (max-width: 480px){
    .summary-bar{ gap: 14px; padding: 10px 14px; }
  }

  .undo-toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a2e38;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 12px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.88rem;
    font-weight: 500;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 1000;
    max-width: 90vw;
  }
  .undo-toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .undo-text{
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .undo-btn{
    background: var(--gold);
    color: #1a1408;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.84rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter .15s ease;
  }
  .undo-btn:hover{ filter: brightness(1.1); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  @media (max-width: 480px){
    header h1{ font-size: 1.7rem; }
    .wrap{ padding: 24px 14px 80px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>مهام المشروع</h1>
    <div class="count" id="taskCount"></div>
  </header>

  <div class="add-box" id="addBox">
    <div class="add-trigger" id="optionsToggle" role="button" tabindex="0">
      <span class="add-trigger-label">إضافة مهمة جديدة</span>
      <span class="plus-circle" id="plusCircle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </span>
    </div>

    <div class="options-panel" id="optionsPanel">
      <div class="options-panel-inner">
        <div class="input-line">
          <input type="text" id="taskInput" placeholder="اكتب مهمة جديدة..." />
        </div>

        <div class="option-row">
          <span class="option-row-label">الأهمية</span>
          <div class="chip-group">
            <button class="chip active" data-pri="عالية">عالية</button>
            <button class="chip" data-pri="متوسطة">متوسطة</button>
            <button class="chip" data-pri="عادية">عادية</button>
          </div>
        </div>

        <button class="add-btn" id="addBtn">إضافة المهمة</button>
      </div>
    </div>
  </div>

  <div class="tabs" id="tabsBar"></div>
  <div class="stats-card" id="statsCard"></div>
  <div id="taskList"></div>
  <div class="past-add-bar" id="pastAddBar"></div>
</div>

<div class="summary-bar" id="summaryBar"></div>

<script>
  const STORAGE_KEY = 'todo_tasks_mua';
  let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let selectedPri = 'عالية';
  let activeTab = 'مهام'; // 'مهام' | 'معاذ' | 'معاذ والقصاص'
  let pickerOpenId = null; // id of task currently showing the owner picker
  let pastAddFormOpen = false; // whether the "add a past completed task" form is open
  const OWNERS = { moaz: 'معاذ', both: 'معاذ والقصاص' };

  const tabIcons = {
    'مهام': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
    'معاذ': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    'معاذ والقصاص': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
  };

  // Migration: legacy "owner = القصاص" (solo) is no longer a valid bucket — fold those
  // tasks into "معاذ والقصاص" since the standalone tab was removed.
  let migrated = false;
  tasks.forEach(t => {
    if(t.done && t.doneBy === 'القصاص'){
      t.doneBy = 'معاذ والقصاص';
      migrated = true;
    }
  });
  tasks.forEach(t => {
    if(t.done && !t.doneBy){
      t.doneBy = 'معاذ';
      migrated = true;
    }
    if(t.done && !t.doneAt){
      t.doneAt = t.id; // fallback: use creation time if no completion time recorded
      migrated = true;
    }
  });
  if(migrated) localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));

  const taskInputEl = document.getElementById('taskInput');
  const addBtnEl = document.getElementById('addBtn');
  const taskCountEl = document.getElementById('taskCount');
  const tabsBarEl = document.getElementById('tabsBar');
  const statsCardEl = document.getElementById('statsCard');
  const pastAddBarEl = document.getElementById('pastAddBar');
  const taskListEl = document.getElementById('taskList');
  const optionsToggleEl = document.getElementById('optionsToggle');
  const optionsPanelEl = document.getElementById('optionsPanel');
  const summaryBarEl = document.getElementById('summaryBar');

  function openPanel(){
    optionsPanelEl.classList.add('open');
    optionsToggleEl.classList.add('open');
  }
  function closePanel(){
    optionsPanelEl.classList.remove('open');
    optionsToggleEl.classList.remove('open');
  }
  function togglePanel(){
    if(optionsPanelEl.classList.contains('open')) closePanel();
    else openPanel();
  }

  optionsToggleEl.addEventListener('click', togglePanel);
  optionsToggleEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      togglePanel();
    }
  });

  document.querySelectorAll('[data-pri]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-pri]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPri = btn.dataset.pri;
    });
  });

  tabsBarEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if(!btn) return;
    activeTab = btn.dataset.tab;
    pickerOpenId = null;
    pastAddFormOpen = false;
    render();
  });

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function addTask(){
    const text = taskInputEl.value.trim();
    if(!text) return;
    tasks.unshift({
      id: Date.now(),
      text,
      pri: selectedPri,
      done: false,
      doneBy: null,
      doneAt: null
    });
    taskInputEl.value = '';
    activeTab = 'مهام';
    closePanel();
    save();
    render();
  }

  addBtnEl.addEventListener('click', addTask);
  taskInputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addTask();
  });

  function togglePastAddForm(){
    pastAddFormOpen = !pastAddFormOpen;
    render();
  }

  function submitPastTask(ownerKey){
    const textEl = document.getElementById('pastTaskText');
    const dayEl = document.getElementById('pastTaskDay');
    const monthEl = document.getElementById('pastTaskMonth');
    const yearEl = document.getElementById('pastTaskYear');
    const text = textEl ? textEl.value.trim() : '';
    if(!text || !dayEl || !monthEl || !yearEl) return;

    const day = parseInt(dayEl.value, 10);
    const month = parseInt(monthEl.value, 10); // already 0-indexed
    const year = parseInt(yearEl.value, 10);

    // build a timestamp from the chosen Gregorian date (kept at local midday to avoid timezone edge cases)
    const doneAt = new Date(year, month, day, 12, 0, 0).getTime();

    tasks.unshift({
      id: Date.now(),
      text,
      pri: 'عادية',
      done: true,
      doneBy: OWNERS[ownerKey],
      doneAt
    });

    pastAddFormOpen = false;
    save();
    render();
  }

  // Clicking the checkbox: if task is pending -> open the inline owner picker
  // (does NOT complete it yet). If task is already done -> un-complete immediately
  // and send it back to "مهام".
  function onCheckboxClick(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;

    if(t.done){
      // toggle back to pending instantly, no confirmation needed
      t.done = false;
      t.doneBy = null;
      t.doneAt = null;
      pickerOpenId = null;
      save();
      render();
      return;
    }

    // pending -> toggle the inline picker open/closed
    pickerOpenId = (pickerOpenId === id) ? null : id;
    render();
  }

  function completeTask(id, ownerKey){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    t.done = true;
    t.doneBy = OWNERS[ownerKey];
    t.doneAt = Date.now();
    pickerOpenId = null;
    save();
    render();
  }

  function cancelPicker(){
    pickerOpenId = null;
    render();
  }

  let pendingDelete = null; // { task, timeoutId }

  function deleteTask(id){
    const idx = tasks.findIndex(t => t.id === id);
    if(idx === -1) return;

    // If a previous delete is still pending undo, finalize it first
    if(pendingDelete){
      clearTimeout(pendingDelete.timeoutId);
      pendingDelete = null;
    }

    if(pickerOpenId === id) pickerOpenId = null;

    const [removedTask] = tasks.splice(idx, 1);
    save();
    render();
    showUndoToast(removedTask, idx);
  }

  function showUndoToast(removedTask, originalIndex){
    let toast = document.getElementById('undoToast');
    if(!toast){
      toast = document.createElement('div');
      toast.id = 'undoToast';
      toast.className = 'undo-toast';
      document.body.appendChild(toast);
    }
    toast.innerHTML = `
      <span class="undo-text">تم حذف "${escapeHTML(truncate(removedTask.text, 28))}"</span>
      <button class="undo-btn" id="undoBtn">تراجع</button>
    `;
    toast.classList.add('show');

    document.getElementById('undoBtn').onclick = () => {
      clearTimeout(pendingDelete.timeoutId);
      tasks.splice(originalIndex, 0, removedTask);
      pendingDelete = null;
      save();
      render();
      toast.classList.remove('show');
    };

    const timeoutId = setTimeout(() => {
      toast.classList.remove('show');
      pendingDelete = null;
    }, 5000);

    pendingDelete = { task: removedTask, timeoutId };
  }

  function truncate(str, max){
    return str.length > max ? str.slice(0, max) + '…' : str;
  }

  const priOrder = { 'عالية': 0, 'متوسطة': 1, 'عادية': 2 };

  function pluralizeTask(n){
    if(n === 1) return 'مهمة';
    if(n === 2) return 'مهمتان';
    if(n >= 3 && n <= 10) return 'مهام';
    return 'مهمة';
  }

  const GREGORIAN_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  function formatDoneDate(ts){
    const d = new Date(ts);
    return `${d.getDate()} ${GREGORIAN_MONTHS[d.getMonth()]}`;
  }

  function renderSummaryBar(){
    if(!summaryBarEl) return;
    const pendingTasks = tasks.filter(t => !t.done);
    if(pendingTasks.length === 0){
      summaryBarEl.innerHTML = `<span class="summary-empty">لا توجد مهام متبقية 🎉</span>`;
      return;
    }
    const counts = {
      'عالية': pendingTasks.filter(t => t.pri === 'عالية').length,
      'متوسطة': pendingTasks.filter(t => t.pri === 'متوسطة').length,
      'عادية': pendingTasks.filter(t => t.pri === 'عادية').length
    };
    summaryBarEl.innerHTML = ['عالية', 'متوسطة', 'عادية']
      .filter(p => counts[p] > 0)
      .map(p => `
        <span class="summary-item pri-${p}">
          <span class="summary-dot pri-${p}"></span>
          ${counts[p]} ${p}
        </span>
      `).join('');
  }

  function renderTabs(){
    const pendingCount = tasks.filter(t => !t.done).length;
    const moazCount = tasks.filter(t => t.done && t.doneBy === 'معاذ').length;
    const bothCount = tasks.filter(t => t.done && t.doneBy === 'معاذ والقصاص').length;
    const tabsData = [
      { key: 'مهام', label: 'المهام', count: pendingCount },
      { key: 'معاذ', label: 'معاذ', count: moazCount },
      { key: 'معاذ والقصاص', label: 'معاذ والقصاص', count: bothCount }
    ];
    tabsBarEl.innerHTML = tabsData.map(tb => `
      <button class="tab-btn ${activeTab === tb.key ? 'active' : ''}" data-tab="${tb.key}">
        ${tabIcons[tb.key]}
        <span>${tb.label}</span>
        ${tb.count ? `<span class="tab-count">${tb.count}</span>` : ''}
      </button>
    `).join('');
  }

  function renderPastAddBar(){
    if(activeTab === 'مهام'){
      pastAddBarEl.innerHTML = '';
      return;
    }

    const ownerKey = activeTab === 'معاذ' ? 'moaz' : 'both';

    if(!pastAddFormOpen){
      pastAddBarEl.innerHTML = `
        <button class="past-add-trigger" onclick="togglePastAddForm()" title="إضافة مهمة منجزة سابقاً">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      `;
      return;
    }

    const now = new Date();
    const todayDay = now.getDate();
    const todayMonth = now.getMonth(); // 0-indexed
    const todayYear = now.getFullYear();
    const monthNames = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

    const dayOptions = Array.from({length: 31}, (_, i) => i + 1)
      .map(d => `<option value="${d}" ${d === todayDay ? 'selected' : ''}>${d}</option>`).join('');
    const monthOptions = monthNames
      .map((m, i) => `<option value="${i}" ${i === todayMonth ? 'selected' : ''}>${m}</option>`).join('');
    const yearOptions = Array.from({length: 6}, (_, i) => todayYear - i)
      .map(y => `<option value="${y}" ${y === todayYear ? 'selected' : ''}>${y}</option>`).join('');

    pastAddBarEl.innerHTML = `
      <div class="past-add-form">
        <input type="text" id="pastTaskText" placeholder="اكتب المهمة المنجزة سابقاً..." />
        <div class="past-date-row">
          <select id="pastTaskDay">${dayOptions}</select>
          <select id="pastTaskMonth">${monthOptions}</select>
          <select id="pastTaskYear">${yearOptions}</select>
        </div>
        <div class="past-add-form-row">
          <button class="add-btn" onclick="submitPastTask('${ownerKey}')">إضافة</button>
          <button class="owner-cancel" onclick="togglePastAddForm()">إلغاء</button>
        </div>
      </div>
    `;
  }

  function renderStatsCard(){
    if(activeTab === 'مهام'){
      statsCardEl.classList.add('hidden');
      statsCardEl.innerHTML = '';
      return;
    }

    const now = Date.now();
    const ONE_DAY = 24 * 60 * 60 * 1000;
    const weekAgo = now - 7 * ONE_DAY;
    const monthAgo = now - 30 * ONE_DAY;

    const doneForTab = tasks.filter(t => t.done && t.doneBy === activeTab && t.doneAt);
    const weekCount = doneForTab.filter(t => t.doneAt >= weekAgo).length;
    const monthCount = doneForTab.filter(t => t.doneAt >= monthAgo).length;
    const totalCount = doneForTab.length;

    statsCardEl.classList.remove('hidden');
    statsCardEl.innerHTML = `
      <div class="stat-item">
        <span class="stat-num">${weekCount}</span>
        <span class="stat-label">هذا الأسبوع</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${monthCount}</span>
        <span class="stat-label">هذا الشهر</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${totalCount}</span>
        <span class="stat-label">الإجمالي</span>
      </div>
    `;
  }

  function render(){
    renderTabs();
    renderStatsCard();
    renderPastAddBar();

    const totalPending = tasks.filter(t => !t.done).length;
    taskCountEl.textContent = totalPending ? `${totalPending} ${pluralizeTask(totalPending)} متبقية إجمالاً` : 'لا توجد مهام متبقية';

    renderSummaryBar();

    let listHTML = '';

    if(activeTab === 'مهام'){
      const pending = tasks.filter(t => !t.done).sort((a,b) => priOrder[a.pri] - priOrder[b.pri]);
      if(pending.length === 0){
        listHTML = `<div class="empty">لا توجد مهام حالياً. أضف مهمتك الأولى أعلاه.</div>`;
      } else {
        listHTML = pending.map(taskHTML).join('');
      }
    } else {
      // 'معاذ' or 'معاذ والقصاص' tab: show that bucket's completed tasks, most recent first
      const doneByPerson = tasks
        .filter(t => t.done && t.doneBy === activeTab)
        .sort((a,b) => (b.doneAt || 0) - (a.doneAt || 0));
      if(doneByPerson.length === 0){
        listHTML = `<div class="empty">لا توجد مهام منجزة من ${activeTab} حتى الآن.</div>`;
      } else {
        listHTML = doneByPerson.map(taskHTML).join('');
      }
    }

    taskListEl.innerHTML = listHTML;
  }

  function isAddedToday(id){
    const taskDate = new Date(id);
    const now = new Date();
    return taskDate.getFullYear() === now.getFullYear()
        && taskDate.getMonth() === now.getMonth()
        && taskDate.getDate() === now.getDate();
  }

  function taskHTML(t){
    const today = !t.done && isAddedToday(t.id);
    const showPicker = pickerOpenId === t.id;
    return `
      <div class="task ${t.done ? 'done' : ''}" data-pri="${t.pri}">
        <div class="task-row">
          <button class="checkbox ${t.done ? 'checked' : ''}" onclick="onCheckboxClick(${t.id})">${t.done ? '✓' : ''}</button>
          <div class="task-body">
            <div class="task-text" ${t.done ? '' : 'contenteditable="true"'} spellcheck="false"
                 onblur="saveEdit(${t.id}, this)"
                 onkeydown="handleEditKey(event, this)">${escapeHTML(t.text)}</div>
          </div>
          ${t.done && t.doneAt ? `<span class="done-date">${formatDoneDate(t.doneAt)}</span>` : ''}
          ${today ? '<span class="today-dot" title="أُضيفت اليوم"></span>' : ''}
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
        <div class="owner-picker ${showPicker ? 'open' : ''}">
          <div class="owner-picker-inner">
            <span class="owner-picker-label">من أنجزها؟</span>
            <button class="owner-btn moaz" onclick="completeTask(${t.id}, 'moaz')">معاذ</button>
            <button class="owner-btn both" onclick="completeTask(${t.id}, 'both')">معاذ والقصاص</button>
            <button class="owner-cancel" onclick="cancelPicker()">إلغاء</button>
          </div>
        </div>
      </div>
    `;
  }

  function saveEdit(id, el){
    const newText = el.textContent.trim();
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    if(newText === ''){
      el.textContent = t.text;
      return;
    }
    if(newText !== t.text){
      t.text = newText;
      save();
    }
  }

  function handleEditKey(e, el){
    if(e.key === 'Enter'){
      e.preventDefault();
      el.blur();
    }
    if(e.key === 'Escape'){
      e.preventDefault();
      el.blur();
    }
  }

  function escapeHTML(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function sizeTitleLine(){
    const h1 = document.querySelector('header h1');
    const header = document.querySelector('header');
    if(h1 && header){
      const width = h1.getBoundingClientRect().width;
      header.style.setProperty('--title-line-width', (width + 6) + 'px');
    }
  }

  render();
  sizeTitleLine();
  window.addEventListener('resize', sizeTitleLine);

  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(sizeTitleLine);
  }
</script>

</body>
</html>
