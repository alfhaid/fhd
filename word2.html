  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* arabic */\n@font-face {\n  font-family: 'Tajawal';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"8c88218f-c7dc-45e4-a601-e141545d9b73\") format('woff2');\n  unicode-range: U+0600-06FF, U+0750-077F, U+0870-088E, U+0890-0891, U+0897-08E1, U+08E3-08FF, U+200C-200E, U+2010-2011, U+204F, U+2E41, U+FB50-FDFF, U+FE70-FE74, U+FE76-FEFC, U+102E0-102FB, U+10E60-10E7E, U+10EC2-10EC4, U+10EFC-10EFF, U+1EE00-1EE03, U+1EE05-1EE1F, U+1EE21-1EE22, U+1EE24, U+1EE27, U+1EE29-1EE32, U+1EE34-1EE37, U+1EE39, U+1EE3B, U+1EE42, U+1EE47, U+1EE49, U+1EE4B, U+1EE4D-1EE4F, U+1EE51-1EE52, U+1EE54, U+1EE57, U+1EE59, U+1EE5B, U+1EE5D, U+1EE5F, U+1EE61-1EE62, U+1EE64, U+1EE67-1EE6A, U+1EE6C-1EE72, U+1EE74-1EE77, U+1EE79-1EE7C, U+1EE7E, U+1EE80-1EE89, U+1EE8B-1EE9B, U+1EEA1-1EEA3, U+1EEA5-1EEA9, U+1EEAB-1EEBB, U+1EEF0-1EEF1;\n}\n/* latin */\n@font-face {\n  font-family: 'Tajawal';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c60985b0-8ebf-4638-9e05-4440651efe64\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{background-color:#0a2620;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.03) 0px,rgba(255,255,255,0.03) 1px,transparent 1px,transparent 22px),radial-gradient(130% 100% at 50% -5%,#1e5a4b 0%,#123f36 52%,#0a2620 100%);background-attachment:fixed;color:#e9f4f0;font-family:'Tajawal',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}\nhtml{touch-action:manipulation;}\n\n/* ── Brand logo (tiles) ── */\n.brand{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:'Baloo Bhaijaan 2',sans-serif;}\n.bpill{background:#F5B301;color:#20150a;font-weight:800;font-size:12px;padding:2px 15px;border-radius:999px;letter-spacing:.5px;line-height:1.7;}\n.brow{direction:rtl;display:flex;gap:6px;}\n.bt{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:800;color:#fff;font-family:'Baloo Bhaijaan 2',sans-serif;}\n.bt.num{font-family:'Lalezar',sans-serif;font-size:25px;}\n.bt.g{background:linear-gradient(160deg,#3BB273,#2C935C);box-shadow:inset 0 2px 0 rgba(255,255,255,.3),0 3px 0 #1f6c43;}\n.bt.gr{background:linear-gradient(160deg,#98A2B3,#6C7688);box-shadow:inset 0 2px 0 rgba(255,255,255,.3),0 3px 0 #4b5464;}\n.bt.am{background:linear-gradient(160deg,#F2B84F,#E19A2E);box-shadow:inset 0 2px 0 rgba(255,255,255,.32),0 3px 0 #b3781c;}\n.bt.rd{background:linear-gradient(160deg,#EC5A50,#D0342A);box-shadow:inset 0 2px 0 rgba(255,255,255,.28),0 3px 0 #9e241c;}\n.brand-lg .bt{width:50px;height:50px;font-size:31px;border-radius:12px;}\n.brand-lg .bt.num{font-size:33px;}\n.brand-lg .bpill{font-size:14px;padding:3px 19px;}\n.brand-lg .brow{gap:8px;}\n\n/* ── Sound button ── */\n.aw-sb{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:background .12s;}\n.aw-sb:hover{background:rgba(255,255,255,.2);}\n\n/* ── Auth ── */\n#aw-auth{position:fixed;inset:0;background-color:#0a2620;background-image:radial-gradient(130% 100% at 50% -5%,#1e5a4b 0%,#123f36 52%,#0a2620 100%);display:flex;align-items:center;justify-content:center;z-index:999;direction:rtl;padding:1rem;}\n.aw-ac{background:#fff;border-radius:24px;padding:2.2rem 1.75rem;width:330px;text-align:center;box-shadow:0 20px 60px rgba(4,20,16,.45);}\n.aw-ai{width:100%;height:46px;border:1.5px solid #bcdccf;border-radius:11px;background:#f4f8f6;color:#12241f;font-size:18px;font-family:inherit;text-align:center;letter-spacing:4px;padding:0 36px 0 8px;outline:none;transition:border-color .15s;}\n.aw-ai:focus{border-color:#2C935C;}\n.aw-ai.shake{animation:aw-shake .3s ease;}\n.aw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8aada8;font-size:16px;padding:0;}\n.aw-ab{width:100%;height:46px;background:#2C935C;color:#fff;border:none;border-radius:12px;font-size:16px;font-family:inherit;font-weight:800;cursor:pointer;margin-top:4px;transition:opacity .1s,transform .05s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 0 #1f6c43;}\n.aw-ab:hover{opacity:.94;}\n.aw-ab:active{transform:translateY(3px);box-shadow:none;}\n.aw-ae{font-size:12px;color:#D0342A;min-height:18px;margin-top:6px;}\n@keyframes aw-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}\n\n/* ── Main ── */\n#aw-main{max-width:460px;margin:0 auto;padding:.6rem 1rem 2rem;position:relative;overflow-x:hidden;}\n#aw-main.hidden{display:none;}\n\n/* ── Stat cards ── */\n.aw-stats{display:flex;gap:10px;margin-bottom:1rem;direction:rtl;}\n.aw-card{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:13px 6px 11px;display:flex;flex-direction:column;align-items:center;gap:7px;}\n.aw-chip{display:flex;align-items:center;justify-content:center;}\n.aw-chip svg{width:30px;height:30px;fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round;}\n.aw-chip svg .f{stroke:none;}\n.aw-chip-g svg{stroke:#43C07E;}\n.aw-chip-g svg .f{fill:#43C07E;}\n.aw-chip-a svg{stroke:#F5B93F;}\n.aw-chip-a svg .f{fill:#F5B93F;}\n.aw-chip-r svg{stroke:#F0685E;}\n.aw-chip-r svg .f{fill:#F0685E;}\n.aw-bn{font-size:27px;font-weight:800;line-height:1;display:block;font-family:'Baloo Bhaijaan 2',sans-serif;}\n.aw-bl-label{font-size:10.5px;color:#9fc2b8;letter-spacing:.2px;font-weight:700;}\n\n/* ── Game card ── */\n#aw-ga{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:16px 12px 15px;}\n\n/* ── Tiles ── */\n.aw-tile{width:46px;height:46px;border:2px solid rgba(255,255,255,.22);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;background:rgba(255,255,255,.05);color:#fff;transition:border-color .08s;will-change:transform;font-family:'Tajawal',sans-serif;}\n.aw-tile.filled{border-color:#43C07E;background:rgba(67,192,126,.16);}\n.aw-tile.correct{background:linear-gradient(160deg,#3BB273,#2C935C);border-color:#2C935C;color:#fff;box-shadow:inset 0 2px 0 rgba(255,255,255,.25);}\n.aw-tile.present{background:linear-gradient(160deg,#F2B84F,#E19A2E);border-color:#E19A2E;color:#fff;box-shadow:inset 0 2px 0 rgba(255,255,255,.28);}\n.aw-tile.absent{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.09);color:#7f978f;}\n\n/* ── Keyboard ── */\n.aw-key{height:42px;flex:1;min-width:0;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.12);color:#eef4f1;cursor:pointer;font-family:inherit;font-size:clamp(11px,3.2vw,14px);font-weight:700;padding:0;touch-action:manipulation;transition:background .1s;-webkit-tap-highlight-color:transparent;}\n.aw-key:hover{background:rgba(255,255,255,.2);}\n.aw-key.correct{background:#2C935C;border-color:#2C935C;color:#fff;}\n.aw-key.present{background:#E19A2E;border-color:#E19A2E;color:#fff;}\n.aw-key.absent{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);color:#6f8a82;}\n.aw-key-del{flex:1.5;font-size:clamp(12px,3.5vw,15px);}\n\n#aw-msg{font-size:13px;color:#bfe0d6;min-height:20px;text-align:center;direction:rtl;margin:.1rem 0 .7rem;font-weight:600;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ══ AUTH SCREEN ══ -->\n<div id=\"aw-auth\">\n  <div class=\"aw-ac\">\n    \n    <div class=\"brand brand-lg\" style=\"margin:0 auto 1.25rem;\"><div class=\"bpill\">كلمة<\u002Fdiv><div class=\"brow\"><div class=\"bt g\">ع<\u002Fdiv><div class=\"bt gr\">ز<\u002Fdiv><div class=\"bt am\">و<\u002Fdiv><div class=\"bt g\">ز<\u002Fdiv><div class=\"bt num rd\">٢<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font-size:17px;font-weight:700;color:#12241f;margin-bottom:4px;\">أدخل كلمة المرور<\u002Fdiv>\n    <div style=\"font-size:13px;color:#8aada8;margin-bottom:1.25rem;\">هذه اللعبة خاصة بك<\u002Fdiv>\n    <div style=\"position:relative;margin-bottom:.5rem;\">\n      <input class=\"aw-ai\" id=\"aw-ai\" type=\"password\" placeholder=\"••••••\" maxlength=\"20\" onkeydown=\"if(event.key==='Enter')awCA()\">\n      <button class=\"aw-eye\" onclick=\"awTE()\" title=\"إظهار/إخفاء\">👁<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"aw-ae\" id=\"aw-ae\"><\u002Fdiv>\n    <button class=\"aw-ab\" onclick=\"awCA()\">دخول<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ GAME ══ -->\n<div id=\"aw-main\" class=\"hidden\">\n  \n\n  <div style=\"position:relative;display:flex;align-items:center;justify-content:center;padding:12px 0 22px;\">\n    <button class=\"aw-sb\" id=\"aw-sb\" onclick=\"awTS()\" title=\"تشغيل/إيقاف الصوت\" style=\"position:absolute;left:0;bottom:27px;\"><svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\"><path d=\"M4 9v6h4l5 4V5L8 9H4z\" fill=\"#fff\"><\u002Fpath><path d=\"M16 8.5a5 5 0 0 1 0 7\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M18.6 6a8 8 0 0 1 0 12\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <div class=\"brand brand-lg\">\n      <div class=\"bpill\">كلمة<\u002Fdiv>\n      <div class=\"brow\"><div class=\"bt g\">ع<\u002Fdiv><div class=\"bt gr\">ز<\u002Fdiv><div class=\"bt am\">و<\u002Fdiv><div class=\"bt g\">ز<\u002Fdiv><div class=\"bt num rd\">٢<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"aw-stats\">\n    <div class=\"aw-card\">\n      <div class=\"aw-chip aw-chip-g\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"5\"><\u002Fcircle><circle class=\"f\" cx=\"12\" cy=\"12\" r=\"1.7\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <span class=\"aw-bn\" id=\"aw-bt\" style=\"color:#fff;\">—<\u002Fspan>\n      <div class=\"aw-bl-label\">رصيدك اليوم<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"aw-card\">\n      <div class=\"aw-chip aw-chip-a\"><svg viewBox=\"0 0 24 24\"><path class=\"f\" d=\"M12 2.5l2.7 5.9 6.4.6-4.85 4.25 1.45 6.35L12 16.9 6.35 19.6l1.45-6.35L2.9 9l6.4-.6z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <span class=\"aw-bn\" id=\"aw-bp\" style=\"color:#fff;\">—<\u002Fspan>\n      <div class=\"aw-bl-label\">نقاطك<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"aw-card\">\n      <div class=\"aw-chip aw-chip-r\"><svg viewBox=\"0 0 24 24\"><path class=\"f\" d=\"M3 8.2l4.3 3.3L12 4.6l4.7 6.9L21 8.2 19.1 19H4.9z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <span class=\"aw-bn\" id=\"aw-bw\" style=\"color:#fff;\">—<\u002Fspan>\n      <div class=\"aw-bl-label\">انتصاراتك<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n  <p id=\"aw-msg\">&nbsp;<\u002Fp>\n\n  <div id=\"aw-ga\">\n    <div id=\"aw-grid\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:.6rem;direction:rtl;\"><\u002Fdiv>\n    <div id=\"aw-kb\" style=\"display:flex;flex-direction:column;gap:3px;direction:ltr;width:100%;padding:0 0.25rem;\"><\u002Fdiv>\n    <div style=\"text-align:center;margin-top:.85rem;\">\n      <button class=\"aw-key\" onclick=\"awNG()\" style=\"min-width:130px;height:40px;font-size:13px;font-weight:800;background:#2C935C;color:#fff;border-color:#2C935C;box-shadow:0 3px 0 #1f6c43;\">لعبة جديدة<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"aw-bl\" style=\"display:none;text-align:center;padding:2.4rem 1.5rem;direction:rtl;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;\">\n    <div style=\"font-size:40px;margin-bottom:10px;\">⏳<\u002Fdiv>\n    <div style=\"font-size:17px;font-weight:800;color:#eaf4f0;margin-bottom:9px;\">انتهى رصيدك اليوم<\u002Fdiv>\n    <div style=\"font-size:13px;color:#9fc2b8;line-height:1.7;\" id=\"aw-blm\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ════════════════════════════════════════\n//  ⚙️  الإعدادات — عدّلها هنا فقط\n// ════════════════════════════════════════\nconst AW_PASS = 'falfuhaid';   // كلمة المرور\nconst AW_DL   = 10;             // عدد اللعبات المسموح يومياً\n\n// ════════════════════════════════════════\n//  📚  قائمة الكلمات (5 حروف لكل كلمة)\n//  لإضافة كلمات: أضف سطراً جديداً بنفس الشكل\n// ════════════════════════════════════════\nconst AW_W = [\n  ['م','ش','ا','ر','ك','ة'],  // مشاركة\n  ['م','ح','ا','و','ل','ة'],  // محاولة\n  ['م','ب','ا','ر','ا','ة'],  // مباراة\n  ['م','ك','ا','ف','أ','ة'],  // مكافأة\n  ['م','س','ا','ب','ق','ة'],  // مسابقة\n  ['م','ن','ا','ف','س','ة'],  // منافسة\n  ['م','س','ا','ع','د','ة'],  // مساعدة\n  ['م','ح','ا','ض','ر','ة'],  // محاضرة\n  ['م','ر','ا','ج','ع','ة'],  // مراجعة\n  ['م','ر','ا','ق','ب','ة'],  // مراقبة\n  ['م','ط','ا','ر','د','ة'],  // مطاردة\n  ['م','ك','ا','ل','م','ة'],  // مكالمة\n  ['م','ق','ا','و','م','ة'],  // مقاومة\n  ['م','غ','ا','م','ر','ة'],  // مغامرة\n  ['م','ن','ا','ق','ش','ة'],  // مناقشة\n  ['م','و','ا','ط','ن','ة'],  // مواطنة\n  ['م','ع','ا','م','ل','ة'],  // معاملة\n  ['م','ف','ا','و','ض','ة'],  // مفاوضة\n  ['م','ج','ا','م','ل','ة'],  // مجاملة\n  ['م','ن','ا','و','ر','ة'],  // مناورة\n  ['م','س','ا','ه','م','ة'],  // مساهمة\n  ['م','ف','ا','ت','ي','ح'],  // مفاتيح\n  ['م','ص','ا','ب','ي','ح'],  // مصابيح\n  ['ب','س','ا','ت','ي','ن'],  // بساتين\n  ['ع','ص','ا','ف','ي','ر'],  // عصافير\n  ['ق','ن','ا','د','ي','ل'],  // قناديل\n  ['س','ل','ا','ط','ي','ن'],  // سلاطين\n  ['أ','س','ا','ط','ي','ر'],  // أساطير\n  ['ص','و','ا','ر','ي','خ'],  // صواريخ\n  ['ط','و','ا','ح','ي','ن'],  // طواحين\n  ['ف','و','ا','ن','ي','س'],  // فوانيس\n  ['ط','و','ا','ب','ي','ر'],  // طوابير\n  ['م','ط','ا','ر','ا','ت'],  // مطارات\n  ['د','ر','ا','س','ا','ت'],  // دراسات\n  ['ز','ي','ا','ر','ا','ت'],  // زيارات\n  ['ح','ك','ا','ي','ا','ت'],  // حكايات\n  ['ذ','ك','ر','ي','ا','ت'],  // ذكريات\n  ['ت','م','ا','ر','ي','ن'],  // تمارين\n  ['ت','ق','ا','ر','ي','ر'],  // تقارير\n  ['ت','ص','ا','م','ي','م'],  // تصاميم\n  ['م','ش','ا','ر','ي','ع'],  // مشاريع\n  ['ق','ر','ا','ء','ا','ت'],  // قراءات\n  ['م','ش','ه','و','ر','ة'],  // مشهورة\n  ['م','ك','ت','و','ب','ة'],  // مكتوبة\n  ['م','ح','ب','و','ب','ة'],  // محبوبة\n  ['م','م','ت','ا','ز','ة'],  // ممتازة\n  ['م','ش','غ','و','ل','ة'],  // مشغولة\n  ['م','ض','م','و','ن','ة'],  // مضمونة\n  ['م','ن','ا','س','ب','ة'],  // مناسبة\n  ['م','ف','ا','ج','أ','ة'],  // مفاجأة\n];\n\n// ════════════════════════════════════════\n//  لا تعدّل ما تحت هذا السطر\n// ════════════════════════════════════════\nconst AW_AK='awg_auth_v1', AW_SK='awg_v1';\n\nconst AW_KB=[\n  ['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د'],\n  ['ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط'],\n  ['ئ','ء','ؤ','ر','ى','ة','و','ز','ظ','ذ','DEL'],\n];\nconst AW_ALL=['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د','ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط','ئ','ء','ؤ','ر','ى','ة','و','ز','ظ','ذ'];\n\nlet awTgt,awTI,awCur=[],awAtt=[],awOver=false,awLocked=false,awSnd=true;\nconst awKE={};\nlet _awC;\n\n// ── Audio ──\nfunction awCtx(){if(!_awC)_awC=new(window.AudioContext||window.webkitAudioContext)();if(_awC.state==='suspended')_awC.resume();return _awC;}\nfunction awPC(){if(!awSnd)return;try{const c=awCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=900;g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);o.start();o.stop(c.currentTime+0.06);}catch(e){}}\nfunction awPB(){if(!awSnd)return;try{const c=awCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=350;g.gain.setValueAtTime(0.07,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.start();o.stop(c.currentTime+0.15);}catch(e){}}\nfunction awPL(){if(!awSnd)return;try{const c=awCtx();[280,230,180].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=f;const t=c.currentTime+i*.13;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+.11);o.start(t);o.stop(t+.11);});}catch(e){}}\nfunction awPW(){if(!awSnd)return;try{const c=awCtx();[523,659,784,1047,1319].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;const t=c.currentTime+i*.1;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+.22);o.start(t);o.stop(t+.22);});setTimeout(()=>{try{[784,1047,1319,1568].forEach((f,i)=>{const o=_awC.createOscillator(),g=_awC.createGain();o.connect(g);g.connect(_awC.destination);o.type='sine';o.frequency.value=f;const t=_awC.currentTime+i*.08;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+.18);o.start(t);o.stop(t+.18);});}catch(e){}},600);}catch(e){}}\nconst AW_SVG_ON='<svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\"><path d=\"M4 9v6h4l5 4V5L8 9H4z\" fill=\"#fff\"><\u002Fpath><path d=\"M16 8.5a5 5 0 0 1 0 7\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M18.6 6a8 8 0 0 1 0 12\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>';\nconst AW_SVG_OFF='<svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\"><path d=\"M4 9v6h4l5 4V5L8 9H4z\" fill=\"#fff\"><\u002Fpath><path d=\"M16.5 9.5l5 5M21.5 9.5l-5 5\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>';\nfunction awTS(){awSnd=!awSnd;document.getElementById('aw-sb').innerHTML=awSnd?AW_SVG_ON:AW_SVG_OFF;}\n\n// ── Auth ──\nfunction awCA(){\n  const v=document.getElementById('aw-ai').value;\n  if(v===AW_PASS){\n    try{localStorage.setItem(AW_AK,'1');}catch(e){}\n    document.getElementById('aw-auth').style.display='none';\n    document.getElementById('aw-main').classList.remove('hidden');\n    awNG();\n  } else {\n    const i=document.getElementById('aw-ai');\n    document.getElementById('aw-ae').textContent='كلمة المرور غلط، حاول مرة ثانية';\n    i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');\n    i.value='';i.focus();\n  }\n}\nfunction awTE(){const i=document.getElementById('aw-ai');i.type=i.type==='password'?'text':'password';}\n\n// ── State ──\nfunction awGS(){try{return JSON.parse(localStorage.getItem(AW_SK))||awDS();}catch{return awDS();}}\nfunction awDS(){return{usedWords:[],dailyDate:'',dailyCount:0,wins:0,totalPlayed:0,points:0,streak:0,bestStreak:0};}\nfunction awSS(s){try{localStorage.setItem(AW_SK,JSON.stringify(s));}catch{}}\nfunction awTd(){return new Date().toISOString().split('T')[0];}\nfunction awCD(s){if(s.dailyDate!==awTd()){s.dailyDate=awTd();s.dailyCount=0;}return s;}\nfunction awRem(s){return AW_W.map((_,i)=>i).filter(i=>!s.usedWords.includes(i)).length;}\nfunction awRT(s){return Math.max(0,AW_DL-s.dailyCount);}\nfunction awPick(s){const a=AW_W.map((_,i)=>i).filter(i=>!s.usedWords.includes(i));if(!a.length)return null;return a[Math.floor(Math.random()*a.length)];}\n\n// ── Balance ──\nfunction awRB(){\n  const s=awCD(awGS()),rt=awRT(s);\n  const bt=document.getElementById('aw-bt');\n  if(bt){bt.innerHTML=rt+'<span style=\"font-size:14px;font-weight:400;color:#b0c8c4;\">/'+AW_DL+'<\u002Fspan>';bt.style.color=rt===0?'#ff9166':rt<=3?'#ffcf6b':'#ffffff';}\n  const bp=document.getElementById('aw-bp');\n  if(bp)bp.textContent=(s.points||0);\n  const bw=document.getElementById('aw-bw');\n  if(bw)bw.innerHTML=s.wins+'<span style=\"font-size:14px;font-weight:400;color:#b0c8c4;\">/'+s.totalPlayed+'<\u002Fspan>'+(s.streak>=3?' <span style=\"font-size:13px;\">🔥'+s.streak+'<\u002Fspan>':'');\n}\n\n// ── Game ──\nfunction awNG(){\n  let s=awGS();s=awCD(s);\n  if(awRT(s)<=0){awSBL(s);return;}\n  const idx=awPick(s);\n  if(idx===null){awSM('انتهيت من كل الكلمات! انتظر كلمات جديدة');return;}\n  awTI=idx;awTgt=AW_W[idx];\n  awCur=[];awAtt=[];awOver=false;awLocked=false;\n  awSM('');\n  document.getElementById('aw-ga').style.display='flex';\n  document.getElementById('aw-ga').style.flexDirection='column';\n  document.getElementById('aw-bl').style.display='none';\n  awBKB();awRG();awRB();\n}\n\nfunction awSBL(s){\n  document.getElementById('aw-ga').style.display='none';\n  document.getElementById('aw-bl').style.display='block';\n  document.getElementById('aw-blm').textContent='اليوم لعبت '+s.dailyCount+' لعبات وربحت '+s.wins+' — تعال بكرة وعندك '+AW_DL+' رصيد جديد 🎮';\n  awRB();\n}\n\nfunction awEval(g){\n  const res=Array(6).fill('absent');const tc=[...awTgt],gc=[...g];\n  for(let i=0;i<6;i++){if(gc[i]===tc[i]){res[i]='correct';tc[i]=null;gc[i]=null;}}\n  for(let i=0;i<6;i++){if(gc[i]!==null){const j=tc.indexOf(gc[i]);if(j!==-1){res[i]='present';tc[j]=null;}}}\n  return res;\n}\n\n// ── Flip animation ──\nfunction awAnimate(rowIdx,letters,results,done){\n  const HALF=140,STAGGER=150;\n  for(let col=0;col<6;col++){\n    const tile=document.getElementById('awt-'+rowIdx+'-'+col);\n    if(!tile)continue;\n    const delay=col*STAGGER;\n    setTimeout(()=>{\n      tile.style.transition='transform '+HALF+'ms ease-in';\n      tile.style.transform='perspective(300px) rotateX(-90deg)';\n      setTimeout(()=>{\n        tile.classList.add(results[col]);\n        tile.style.transition='transform '+HALF+'ms ease-out';\n        tile.style.transform='perspective(300px) rotateX(0deg)';\n        setTimeout(()=>{awUSK(letters[col],results[col]);awAddRepBadge(tile,letters[col],results[col]);},HALF);\n      },HALF);\n    },delay);\n  }\n  setTimeout(done,4*STAGGER+2*HALF+80);\n}\n\nfunction awSubmit(){\n  if(awOver||awCur.length<6)return;\n  const res=awEval(awCur);\n  const letters=[...awCur];\n  const rowIdx=awAtt.length;\n  awAtt.push({l:letters,r:res});\n  awCur=[];\n  awRG(rowIdx);\n  awAnimate(rowIdx,letters,res,()=>{\n    const won=res.every(r=>r==='correct');\n    if(won){\n      awOver=true;awPW();\n      let s=awGS();s=awCD(s);\n      s.usedWords.push(awTI);s.dailyCount++;s.totalPlayed++;s.wins++;\n      s.streak=(s.streak||0)+1;\n      if(s.streak>(s.bestStreak||0))s.bestStreak=s.streak;\n      const base=AW_PTS[awAtt.length-1]||100;\n      const mult=awGetMult(s.streak);\n      const earned=Math.round(base*mult);\n      s.points=(s.points||0)+earned;\n      awSS(s);\n      const multTxt=mult>1?' × '+mult+' 🔥 = '+earned.toLocaleString('ar-EG'):'';\n      awSM('🎉 أحسنت! +'+base+multTxt+' نقطة');\n      awRB();\n    } else if(awAtt.length>=5){\n      awOver=true;awPL();\n      let s=awGS();s=awCD(s);\n      s.usedWords.push(awTI);s.dailyCount++;s.totalPlayed++;\n      s.streak=0;\n      awSS(s);awSM('الكلمة كانت: '+awTgt.join(''));awRB();\n    } else {\n      awPB();\n    }\n    awLocked=false;\n  });\n}\n\nfunction awAdd(l){\n  if(awOver||awLocked||awCur.length>=6)return;\n  awPC();awCur.push(l);awRG();\n  if(awCur.length===6){awLocked=true;setTimeout(awSubmit,280);}\n}\nfunction awDel(){if(!awOver&&!awLocked&&awCur.length>0){awCur.pop();awRG();}}\nfunction awSM(t){document.getElementById('aw-msg').textContent=t||'\\u00a0';}\n\n// ── Grid ──\n// ── Points constants ──\nconst AW_PTS=[500,400,300,200,100];\nfunction awGetMult(streak){return streak>=5?2:streak>=3?1.5:1;}\nfunction awRepCount(letter){return awTgt.filter(l=>l===letter).length;}\n\n// ── Add repeat badge to a tile ──\nfunction awAddRepBadge(tile,letter,result){\n  const cnt=awRepCount(letter);\n  if(cnt<2)return;\n  const b=document.createElement('span');\n  const nums=['','١','٢','٣','٤'];\n  b.textContent='×'+(nums[cnt]||cnt);\n  b.style='position:absolute;top:4px;left:5px;font-size:9px;font-weight:700;line-height:1;';\n  b.style.color=result==='absent'?'#7a9a95':'rgba(255,255,255,0.8)';\n  tile.style.position='relative';\n  tile.appendChild(b);\n}\n\nfunction awRG(animRow=-1){\n  const g=document.getElementById('aw-grid');g.innerHTML='';\n  for(let row=0;row<5;row++){\n    const rowEl=document.createElement('div');\n    rowEl.style='display:flex;gap:4px;';\n    for(let col=0;col<6;col++){\n      const tile=document.createElement('div');\n      tile.className='aw-tile';tile.id='awt-'+row+'-'+col;\n      if(row<awAtt.length){\n        const a=awAtt[row];tile.textContent=a.l[col];\n        if(row!==animRow){tile.classList.add(a.r[col]);awAddRepBadge(tile,a.l[col],a.r[col]);}\n      } else if(row===awAtt.length&&!awOver&&col<awCur.length){\n        tile.textContent=awCur[col];tile.classList.add('filled');\n      }\n      rowEl.appendChild(tile);\n    }\n    g.appendChild(rowEl);\n  }\n}\n\n// ── Keyboard ──\nfunction awBKB(){\n  const kb=document.getElementById('aw-kb');kb.innerHTML='';\n  Object.keys(awKE).forEach(k=>delete awKE[k]);\n  for(const row of AW_KB){\n    const rowEl=document.createElement('div');rowEl.style='display:flex;gap:2px;width:100%;';\n    for(const key of row){\n      const btn=document.createElement('button');btn.className='aw-key';\n      if(key==='DEL'){btn.textContent='⌫';btn.classList.add('aw-key-del');btn.onclick=awDel;}\n      else{btn.textContent=key;awKE[key]=btn;btn.onclick=()=>awAdd(key);}\n      rowEl.appendChild(btn);\n    }\n    kb.appendChild(rowEl);\n  }\n}\n\nfunction awUSK(l,r){\n  const btn=awKE[l];if(!btn)return;\n  if(r==='correct')btn.className='aw-key correct';\n  else if(r==='present'&&!btn.classList.contains('correct'))btn.className='aw-key present';\n  else if(r==='absent'&&!btn.classList.contains('correct')&&!btn.classList.contains('present'))btn.className='aw-key absent';\n}\n\n// ── Physical keyboard ──\ndocument.addEventListener('keydown',e=>{\n  if(document.getElementById('aw-main').classList.contains('hidden'))return;\n  if(e.key==='Backspace')awDel();\n  else if(AW_ALL.includes(e.key))awAdd(e.key);\n});\n\n// ── Init ──\n(function(){\n  let ok=false;try{ok=localStorage.getItem(AW_AK)==='1';}catch(e){}\n  if(ok){\n    document.getElementById('aw-auth').style.display='none';\n    document.getElementById('aw-main').classList.remove('hidden');\n    awNG();\n  } else {\n    setTimeout(()=>document.getElementById('aw-ai').focus(),100);\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
