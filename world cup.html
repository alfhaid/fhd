<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة توقعات دور الـ٣٢ - كأس العالم ٢٠٢٦</title>
<style>
  :root{
    --wc-navy:#0d1b2e;
    --wc-navy-deep:#050a14;
    --wc-red:#E4002B;
    --wc-blue:#0033A0;
    --wc-green:#00843D;
    --wc-gold:#FFC72C;
    --wc-gold-bright:#FFD966;
    --chalk:#F7F5F0;
    --chalk-dim:#8a93a8;
    --line:rgba(255,199,44,0.18);
    --shadow:0 8px 24px rgba(0,0,0,0.5);
    /* aliases to keep rest of stylesheet consistent with new identity */
    --pitch-dark:var(--wc-navy);
    --pitch:var(--wc-navy-deep);
    --pitch-light:var(--wc-blue);
    --gold:var(--wc-gold);
    --gold-bright:var(--wc-gold-bright);
    --red-card:var(--wc-red);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Tahoma','Segoe UI',sans-serif;
    background:
      radial-gradient(circle at 10% 20%, rgba(255,199,44,0.1), transparent 35%),
      radial-gradient(circle at 90% 80%, rgba(228,0,43,0.12), transparent 35%),
      linear-gradient(160deg, var(--wc-navy) 0%, var(--wc-navy-deep) 100%);
    color:var(--chalk);
    min-height:100vh;
    padding-bottom:60px;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
    background-image:
      repeating-conic-gradient(from 0deg at 0 0, rgba(255,255,255,0.025) 0deg 60deg, transparent 60deg 120deg),
      repeating-conic-gradient(from 0deg at 60px 0, rgba(255,255,255,0.025) 0deg 60deg, transparent 60deg 120deg);
    background-size: 60px 104px;
  }
  .stripe{
    display:none;
    z-index:-1;
  }
  header{
    text-align:center;
    padding:32px 16px 24px;
    position:relative;
  }
  .site-logo{
    width:64px;
    height:64px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:14px;
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
  }
  .host-bar{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-bottom:16px;
  }
  .host-bar span{
    width:36px; height:5px;
    border-radius:3px;
  }
  .host-bar span:nth-child(1){background:var(--wc-red);}
  .host-bar span:nth-child(2){background:var(--wc-blue);}
  .host-bar span:nth-child(3){background:var(--wc-green);}
  .badge26{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:8px;
  }
  .badge26-num{
    font-size:44px;
    font-weight:900;
    letter-spacing:-1px;
    line-height:1;
    background:linear-gradient(90deg, var(--wc-red), var(--wc-gold) 55%, var(--wc-green));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:var(--wc-gold);
  }
  .badge26-ball{
    font-size:34px;
    line-height:1;
  }
  header::after{
    content:"";
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:160px; height:4px;
    background:linear-gradient(90deg, var(--wc-red), var(--wc-blue), var(--wc-green));
    border-radius:2px;
  }
  .eyebrow{
    font-size:clamp(10px, 3vw, 13px);
    letter-spacing:1px;
    color:var(--wc-gold-bright);
    font-weight:700;
    margin-bottom:8px;
    white-space:nowrap;
    padding:0 8px;
  }
  h1{
    font-size:clamp(20px,4.5vw,32px);
    margin:0 0 8px;
    font-weight:800;
    letter-spacing:-0.5px;
  }
  .sub{
    color:var(--chalk-dim);
    font-size:14px;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:0 16px;
  }
  /* Player selector bar */
  .player-bar{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    background:rgba(0,0,0,0.25);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin:24px 0;
  }
  .round-selector-bar{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    margin-bottom:18px;
  }
  .round-selector-bar label{
    font-size:13px;
    color:var(--gold-bright);
    font-weight:800;
  }
  .round-selector-bar select{
    font-weight:800;
    font-size:15px;
    min-width:160px;
  }
  .player-bar label{
    font-size:13px;
    color:var(--chalk-dim);
    font-weight:700;
  }
  select, input[type=text]{
    background:rgba(247,245,240,0.08);
    border:1px solid var(--line);
    color:var(--chalk);
    padding:9px 14px;
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
  }
  select:focus, input:focus{outline:2px solid var(--gold);}
  #newPlayerBtn{
    background:var(--gold);
    color:var(--pitch-dark);
    border:none;
    width:36px; height:36px;
    border-radius:50%;
    font-weight:800;
    cursor:pointer;
    font-size:20px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  #newPlayerBtn:hover{background:var(--gold-bright);}

  /* Tabs */
  .tabs{
    display:flex;
    gap:8px;
    justify-content:center;
    margin:20px 0 8px;
    flex-wrap:wrap;
  }
  .tab{
    background:transparent;
    border:1px solid var(--line);
    color:var(--chalk-dim);
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    transition:.2s;
  }
  .tab.active{
    background:var(--gold);
    color:var(--pitch-dark);
    border-color:var(--gold);
  }

  .view{display:none;}
  .view.active{display:block;}

  /* Match card */
  .match-grid{
    display:grid;
    gap:14px;
    margin-top:20px;
  }
  .match-card{
    background:rgba(0,0,0,0.28);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 18px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .match-card.final{
    border-color:rgba(212,162,76,0.4);
  }
  .match-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-size:12px;
    color:var(--chalk-dim);
  }
  .match-num{
    background:var(--gold);
    color:var(--pitch-dark);
    font-weight:800;
    border-radius:6px;
    padding:2px 8px;
    font-size:11px;
  }
  .status-badge{
    font-size:11px;
    font-weight:700;
    padding:3px 10px;
    border-radius:20px;
  }
  .status-final{background:rgba(193,67,42,0.2); color:#FF8A6E;}
  .status-scheduled{background:rgba(212,162,76,0.18); color:var(--gold-bright);}

  .teams-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:10px;
  }
  .team{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    text-align:center;
  }
  .flag-circle{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--pitch-light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:38px;
    line-height:1;
    border:2px solid var(--line);
    overflow:hidden;
  }
  .team-name{font-size:13px; font-weight:700;}
  .score-box{
    font-size:26px;
    font-weight:800;
    color:var(--gold-bright);
    min-width:60px;
    text-align:center;
  }
  .vs{color:var(--chalk-dim); font-size:13px; font-weight:700;}

  .venue-line{
    text-align:center;
    font-size:11px;
    color:var(--chalk-dim);
    margin-top:10px;
    opacity:0.8;
  }

  /* Prediction row */
  .predict-row{
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .predict-row label{
    font-size:12px;
    color:var(--chalk-dim);
    font-weight:700;
  }
  .pick-btn-group{
    display:flex;
    gap:6px;
  }
  .pick-btn{
    background:rgba(247,245,240,0.06);
    border:1px solid var(--line);
    color:var(--chalk);
    padding:7px 14px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
    transition:.15s;
  }
  .pick-btn:hover{border-color:var(--gold);}
  .pick-btn.selected{
    background:var(--gold);
    color:var(--pitch-dark);
    border-color:var(--gold);
  }
  .pick-result-icon{
    font-size:14px;
    margin-right:4px;
  }
  .correct-tag{color:#7CD992; font-weight:800; font-size:12px;}
  .wrong-tag{color:#FF8A6E; font-weight:800; font-size:12px;}
  .pending-tag{color:var(--chalk-dim); font-size:12px;}

  .no-player-msg{
    text-align:center;
    color:var(--chalk-dim);
    background:rgba(212,162,76,0.1);
    border:1px solid rgba(212,162,76,0.3);
    border-radius:10px;
    padding:12px;
    margin-top:16px;
    font-size:13px;
  }

  /* My Picks summary */
  .mypicks-card{
    background:rgba(0,0,0,0.3);
    border:1px solid var(--gold);
    border-radius:18px;
    padding:20px;
    margin-top:20px;
  }
  .mypicks-header{
    text-align:center;
    margin-bottom:18px;
    padding-bottom:14px;
    border-bottom:2px solid var(--gold);
  }
  .mypicks-name{
    font-size:24px;
    font-weight:800;
    color:var(--gold-bright);
  }
  .mypicks-sub{
    font-size:12px;
    color:var(--chalk-dim);
    margin-top:4px;
  }
  .mypicks-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .mypicks-round-section{
    margin-bottom:18px;
  }
  .mypicks-round-section:last-of-type{
    margin-bottom:0;
  }
  .mypicks-round-title{
    font-size:14px;
    font-weight:800;
    color:var(--gold-bright);
    margin-bottom:10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .mypicks-round-count{
    font-size:11px;
    color:var(--chalk-dim);
    font-weight:700;
  }

  .pick-chip-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .pick-chip{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    background:rgba(247,245,240,0.05);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 4px;
  }
  .pick-chip.empty{
    border-style:dashed;
    opacity:0.5;
  }
  .pick-chip.correct-chip{
    border-color:#7CD992;
  }
  .pick-chip.wrong-chip{
    border-color:var(--red-card);
    opacity:0.75;
  }
  .chip-mark{
    font-weight:800;
  }
  .chip-mark.correct{color:#7CD992;}
  .chip-mark.wrong{color:#FF8A6E;}
  .pick-chip-score{
    font-size:10px;
    color:var(--chalk-dim);
    font-weight:700;
  }
  .pick-chip-num{
    font-size:10px;
    color:var(--chalk-dim);
    font-weight:700;
  }
  .pick-chip-val{
    font-size:12px;
    font-weight:800;
    color:var(--gold-bright);
    width:100%;
    text-align:center;
    line-height:1.25;
    word-break:break-word;
    min-height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(212,162,76,0.15);
    border-radius:8px;
    padding:3px 2px;
  }
  .pick-chip.empty .pick-chip-val{
    color:var(--chalk-dim);
    background:transparent;
    font-size:13px;
  }
  @media (max-width:480px){
    .pick-chip-grid{grid-template-columns:repeat(4, 1fr); gap:5px;}
    .pick-chip{padding:6px 2px;}
    .pick-chip-val{font-size:10px; min-height:26px;}
    .pick-chip-num{font-size:8px;}
  }
  .mypicks-footer{
    text-align:center;
    margin-top:18px;
    padding-top:14px;
    border-top:1px dashed var(--line);
    font-size:12px;
    color:var(--chalk-dim);
  }
  .mypicks-empty{
    text-align:center;
    color:var(--chalk-dim);
    padding:30px;
    font-size:13px;
  }

  .result-entry-row{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .result-entry-row label{
    font-size:12px;
    color:var(--gold-bright);
    font-weight:700;
    width:100%;
    text-align:center;
    margin-bottom:2px;
  }
  .score-input{
    width:48px;
    text-align:center;
    font-size:15px;
    font-weight:800;
    padding:6px 4px;
    background:rgba(247,245,240,0.08);
    border:1px solid var(--line);
    color:var(--chalk);
    border-radius:8px;
  }
  .score-input::placeholder{color:rgba(216,212,200,0.35); font-size:11px;}
  .score-dash{color:var(--chalk-dim); font-weight:700;}
  .clear-score-btn{
    background:transparent;
    border:1px solid var(--red-card);
    color:#FF8A6E;
    width:26px; height:26px;
    border-radius:50%;
    cursor:pointer;
    font-size:12px;
    line-height:1;
  }

  /* Leaderboard */
  .board{
    margin-top:20px;
    background:rgba(0,0,0,0.28);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
  }
  .board-row{
    display:flex;
    align-items:center;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    gap:14px;
  }
  .board-row:last-child{border-bottom:none;}
  .board-row.rank-1{background:linear-gradient(90deg, rgba(212,162,76,0.18), transparent);}
  .rank-num{
    font-weight:800;
    font-size:18px;
    width:30px;
    color:var(--gold-bright);
  }
  .board-name{flex:1; font-weight:700; font-size:15px;}
  .board-pts{
    font-weight:800;
    font-size:18px;
    color:var(--gold-bright);
  }
  .board-sub{font-size:11px; color:var(--chalk-dim);}
  .empty-board{
    text-align:center;
    padding:30px;
    color:var(--chalk-dim);
    font-size:13px;
  }

  /* Admin panel */
  .admin-toggle{
    text-align:center;
    margin-top:30px;
  }
  .admin-toggle button{
    background:transparent;
    border:1px solid var(--line);
    color:var(--chalk-dim);
    padding:8px 16px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
  }
  .admin-panel{
    display:none;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--red-card);
    border-radius:14px;
    padding:18px;
    margin-top:16px;
  }
  .admin-panel.open{display:block;}
  .admin-panel h3{margin-top:0; font-size:15px; color:var(--gold-bright);}
  .pin-row{display:flex; gap:8px; justify-content:center; margin-bottom:14px;}
  .admin-match-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
    flex-wrap:wrap;
  }
  .admin-match-row select{font-size:12px; padding:5px 8px;}
  .save-btn{
    background:var(--gold);
    color:var(--pitch-dark);
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:800;
    cursor:pointer;
    margin-top:12px;
    width:100%;
  }
  .reset-btn{
    background:transparent;
    border:1px solid var(--red-card);
    color:#FF8A6E;
    padding:8px 14px;
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
    margin-top:10px;
  }
  footer{
    text-align:center;
    color:var(--chalk-dim);
    font-size:11px;
    margin-top:40px;
    opacity:0.7;
  }
  @media (max-width:480px){
    .flag-circle{width:52px; height:52px; font-size:30px;}
    .team-name{font-size:11px;}
    .score-box{font-size:20px;}
  }
</style>
</head>

// ID prefixes must stay unique across rounds (1-99 r32, 101-199 r16, 201-299 qf, 301-399 sf, 401+ final)
// to keep predictions/results storage keys collision-free.

let currentRound = localStorage.getItem("wc2026_current_round_v2") || "r32";

function getMatches(){
  return ROUNDS[currentRound].matches;
}

const PIN = "fhd";

// Map FIFA 3-letter codes to ISO 2-letter codes for flag emoji
const FIFA_TO_ISO = {
  RSA:"ZA", CAN:"CA", BRA:"BR", JPN:"JP", GER:"DE", PAR:"PY",
  NED:"NL", MAR:"MA", CIV:"CI", NOR:"NO", FRA:"FR", SWE:"SE",
  MEX:"MX", ECU:"EC", ENG:"GB-ENG", COD:"CD", BEL:"BE", SEN:"SN",
  USA:"US", BIH:"BA", ESP:"ES", AUT:"AT", POR:"PT", CRO:"HR",
  SUI:"CH", DZA:"DZ", AUS:"AU", EGY:"EG", ARG:"AR", CPV:"CV",
  COL:"CO", GHA:"GH"
};

function flagEmoji(fifaCode){
  // England has no standard regional-indicator flag emoji; use St George's cross fallback
  if(fifaCode === "ENG") return "🏴\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}";
  const iso = FIFA_TO_ISO[fifaCode];
  if(!iso || iso.length !== 2) return fifaCode;
  const codePoints = iso.toUpperCase().split("").map(c => 0x1F1E6 + c.charCodeAt(0) - 65);
  return String.fromCodePoint(...codePoints);
}
const STORAGE_KEY = "wc2026_predictions_v2";
const PLAYERS_KEY = "wc2026_players_v2";
const RESULTS_KEY = "wc2026_results_v2";
const CURRENT_PLAYER_KEY = "wc2026_current_player_v2";

let players = JSON.parse(localStorage.getItem(PLAYERS_KEY) || '[]');
let predictions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); // {playerName: {matchId: "home"/"away"}}
let manualResults = JSON.parse(localStorage.getItem(RESULTS_KEY) || "{}"); // {matchId: "home"/"away"}
let currentPlayer = localStorage.getItem(CURRENT_PLAYER_KEY) || "";

function saveAll(){
  localStorage.setItem(PLAYERS_KEY, JSON.stringify(players));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(predictions));
  localStorage.setItem(RESULTS_KEY, JSON.stringify(manualResults));
  localStorage.setItem(CURRENT_PLAYER_KEY, currentPlayer);
}

function matchKey(roundKey, matchId){
  return roundKey + ":" + matchId;
}

function getManualScore(matchId, roundKey){
  roundKey = roundKey || currentRound;
  return manualResults[matchKey(roundKey, matchId)] || null; // {home: int, away: int}
}

function getWinner(match, roundKey){
  roundKey = roundKey || currentRound;
  const ms = getManualScore(match.id, roundKey);
  if(ms){
    if(ms.home === ms.away) return "draw";
    return ms.home > ms.away ? "home" : "away";
  }
  if(match.status === "final" && match.score && match.score.home !== match.score.away){
    return match.score.home > match.score.away ? "home" : "away";
  }
  return null;
}

function renderPlayerSelect(){
  const sel = document.getElementById("playerSelect");
  sel.innerHTML = '<option value="">— اختر اسمك —</option>' +
    players.map(p => `<option value="${p}" ${p===currentPlayer?'selected':''}>${p}</option>`).join("");
}

function renderRoundSelect(){
  const sel = document.getElementById("roundSelect");
  sel.innerHTML = Object.keys(ROUNDS).map(key => {
    const round = ROUNDS[key];
    const countLabel = round.matches.length > 0 ? "" : " (لم تُضف بعد)";
    return `<option value="${key}" ${key===currentRound?'selected':''}>${round.label}${countLabel}</option>`;
  }).join("");
}

function renderMatches(){
  const grid = document.getElementById("matchGrid");
  const matches = getMatches();

  if(matches.length === 0){
    grid.innerHTML = '<div class="no-player-msg">لم تُضف مباريات هذا الدور بعد — يحتاج معرفة المتأهلين من الدور السابق أولاً.</div>';
    return;
  }

  grid.innerHTML = matches.map(m => {
    const winner = getWinner(m);
    const isFinal = winner !== null;
    const myPick = currentPlayer ? (predictions[currentPlayer] || {})[matchKey(currentRound, m.id)] : null;

    let resultTag = "";
    if(isFinal){
      if(myPick){
        resultTag = myPick === winner
          ? '<span class="correct-tag">✓ توقع صحيح</span>'
          : '<span class="wrong-tag">✗ توقع خاطئ</span>';
      } else {
        resultTag = '<span class="pending-tag">لم تتوقع</span>';
      }
    } else if(myPick){
      resultTag = '<span class="pending-tag">توقعك: ' + (myPick==="home"?m.home:m.away) + '</span>';
    }

    const ms = getManualScore(m.id);
    const scoreDisplay = ms
      ? `<div class="score-box">${ms.home} - ${ms.away}</div>`
      : (m.status === "final" && m.score)
        ? `<div class="score-box">${m.score.home} - ${m.score.away}</div>`
        : `<div class="vs">VS</div>`;

    return `
      <div class="match-card ${isFinal?'final':''}">
        <div class="match-meta">
          <span class="match-num">مباراة ${m.id}</span>
          <span>${m.date} · ${m.time}</span>
          <span class="status-badge ${isFinal?'status-final':'status-scheduled'}">${isFinal?'انتهت':'قادمة'}</span>
        </div>
        <div class="teams-row">
          <div class="team">
            <div class="flag-circle">${flagEmoji(m.homeCode)}</div>
            <div class="team-name">${m.home}</div>
          </div>
          ${scoreDisplay}
          <div class="team">
            <div class="flag-circle">${flagEmoji(m.awayCode)}</div>
            <div class="team-name">${m.away}</div>
          </div>
        </div>
        <div class="venue-line">📍 ${m.venue}</div>
        ${m.note ? `<div class="venue-line">${m.note}</div>` : ""}
        <div class="predict-row">
          <label>توقعك:</label>
          <div class="pick-btn-group">
            <button type="button" class="pick-btn ${myPick==='home'?'selected':''}" data-match="${m.id}" data-pick="home" ${!currentPlayer?'disabled':''}>${m.home}</button>
            <button type="button" class="pick-btn ${myPick==='away'?'selected':''}" data-match="${m.id}" data-pick="away" ${!currentPlayer?'disabled':''}>${m.away}</button>
          </div>
          ${resultTag}
        </div>
        <div class="result-entry-row">
          <label>النتيجة:</label>
          <input type="number" min="0" max="20" class="score-input" data-match="${m.id}" data-side="home" value="${ms?ms.home:''}" placeholder="${m.home}">
          <span class="score-dash">—</span>
          <input type="number" min="0" max="20" class="score-input" data-match="${m.id}" data-side="away" value="${ms?ms.away:''}" placeholder="${m.away}">
          ${ms ? `<button type="button" class="clear-score-btn" data-match="${m.id}">✕</button>` : ""}
        </div>
      </div>
    `;
  }).join("");

  grid.querySelectorAll(".pick-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if(!currentPlayer) return;
      const matchId = btn.dataset.match;
      const pick = btn.dataset.pick;
      if(!predictions[currentPlayer]) predictions[currentPlayer] = {};
      predictions[currentPlayer][matchKey(currentRound, matchId)] = pick;
      saveAll();
      renderMatches();
    });
  });

  grid.querySelectorAll(".score-input").forEach(inp => {
    inp.addEventListener("change", () => {
      const matchId = inp.dataset.match;
      const homeInp = grid.querySelector(`.score-input[data-match="${matchId}"][data-side="home"]`);
      const awayInp = grid.querySelector(`.score-input[data-match="${matchId}"][data-side="away"]`);
      const h = homeInp.value, a = awayInp.value;
      if(h !== "" && a !== "" && !isNaN(h) && !isNaN(a)){
        manualResults[matchKey(currentRound, matchId)] = {home: parseInt(h), away: parseInt(a)};
        saveAll();
        renderMatches();
        renderBoard();
      }
    });
  });

  grid.querySelectorAll(".clear-score-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.match;
      delete manualResults[matchKey(currentRound, matchId)];
      saveAll();
      renderMatches();
      renderBoard();
    });
  });
}

function computeLeaderboard(){
  return players.map(p => {
    let pts = 0, total = 0;
    Object.keys(ROUNDS).forEach(roundKey => {
      ROUNDS[roundKey].matches.forEach(m => {
        const winner = getWinner(m, roundKey);
        const pick = (predictions[p] || {})[matchKey(roundKey, m.id)];
        if(winner){
          total++;
          if(pick === winner) pts++;
        }
      });
    });
    return {name:p, pts, total};
  }).sort((a,b) => b.pts - a.pts);
}

function renderBoard(){
  const board = computeLeaderboard();
  const container = document.getElementById("boardContainer");
  if(board.every(b => b.total === 0)){
    container.innerHTML = '<div class="empty-board">لا توجد نتائج محسومة بعد — سجل توقعاتك وانتظر نتائج المباريات</div>';
    return;
  }
  container.innerHTML = board.map((b,i) => `
    <div class="board-row ${i===0 && b.pts>0 ? 'rank-1':''}">
      <div class="rank-num">${i+1}</div>
      <div>
        <div class="board-name">${b.name}</div>
        <div class="board-sub">${b.total} مباراة محسومة</div>
      </div>
      <div style="flex:1"></div>
      <div class="board-pts">${b.pts} نقطة</div>
    </div>
  `).join("");
}

function renderMyPicks(){
  const container = document.getElementById("mypicksContainer");
  if(!currentPlayer){
    container.innerHTML = '<div class="mypicks-empty">اختر اسمك من القائمة فوق أولاً عشان تشوف ملخص توقعاتك.</div>';
    return;
  }
  const myPredictions = predictions[currentPlayer] || {};

  let totalPicked = 0;
  let totalMatches = 0;
  const sections = Object.keys(ROUNDS).map(roundKey => {
    const round = ROUNDS[roundKey];
    if(round.matches.length === 0) return "";

    totalMatches += round.matches.length;
    const pickedCount = round.matches.filter(m => myPredictions[matchKey(roundKey, m.id)]).length;
    totalPicked += pickedCount;

    const chips = round.matches.map(m => {
      const pick = myPredictions[matchKey(roundKey, m.id)];
      const pickLabel = pick === "home" ? m.home : (pick === "away" ? m.away : "—");
      const filled = !!pick;
      const ms = getManualScore(m.id, roundKey);
      const winner = getWinner(m, roundKey);
      const isFinal = winner !== null;

      let statusMark = "";
      let chipClass = filled ? "" : "empty";
      if(isFinal && filled){
        if(pick === winner){
          statusMark = '<span class="chip-mark correct">✓</span>';
          chipClass += " correct-chip";
        } else {
          statusMark = '<span class="chip-mark wrong">✗</span>';
          chipClass += " wrong-chip";
        }
      }
      const scoreLine = ms ? `<span class="pick-chip-score">${ms.home}-${ms.away}</span>` : "";

      return `
        <div class="pick-chip ${chipClass}">
          <span class="pick-chip-num">${m.id} ${statusMark}</span>
          <span class="pick-chip-val">${pickLabel}</span>
          ${scoreLine}
        </div>
      `;
    }).join("");

    return `
      <div class="mypicks-round-section">
        <div class="mypicks-round-title">${round.label} <span class="mypicks-round-count">${pickedCount}/${round.matches.length}</span></div>
        <div class="pick-chip-grid">${chips}</div>
      </div>
    `;
  }).join("");

  container.innerHTML = `
    <div class="mypicks-card">
      <div class="mypicks-header">
        <div class="mypicks-name">🏆 ${currentPlayer}</div>
        <div class="mypicks-sub">${totalPicked} من ${totalMatches} توقع · عبر كل الأدوار</div>
      </div>
      ${sections}
      <div class="mypicks-footer">📸 صوّر هذا الملخص وأرسله لتجميع توقعات العائلة</div>
    </div>
  `;
}

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.view).classList.add("active");
    if(tab.dataset.view === "board") renderBoard();
    if(tab.dataset.view === "mypicks") renderMyPicks();
  });
});

// Player select
document.getElementById("playerSelect").addEventListener("change", (e) => {
  currentPlayer = e.target.value;
  saveAll();
  renderMatches();
  renderMyPicks();
});

// Round select
document.getElementById("roundSelect").addEventListener("change", (e) => {
  currentRound = e.target.value;
  localStorage.setItem("wc2026_current_round_v2", currentRound);
  renderMatches();
});

document.getElementById("newPlayerBtn").addEventListener("click", () => {
  const name = prompt("اكتب اسمك:");
  if(name && name.trim()){
    const trimmed = name.trim();
    if(!players.includes(trimmed)){
      players.push(trimmed);
    }
    currentPlayer = trimmed;
    saveAll();
    renderPlayerSelect();
    renderMatches();
    renderMyPicks();
  }
});

// Reset

document.getElementById("resetAllBtn").addEventListener("click", () => {
  if(confirm("هل أنت متأكد؟ هذا سيمسح جميع التوقعات والنتائج اليدوية لجميع اللاعبين")){
    predictions = {};
    manualResults = {};
    saveAll();
    renderMatches();
    renderBoard();
  }
});

// Init
renderPlayerSelect();
renderRoundSelect();
renderMatches();
renderBoard();
</script>
</body>
</html>
